# Nixpacks 配置 - Railway 部署
[phases.setup]
nixPkgs = ["python311", "gcc"]
aptPkgs = ["python3-pil"]

[phases.install]
cmds = ["pip install --upgrade pip && pip install -r requirements.txt"]

[phases.build]
cmds = []

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"

[variables]
PYTHON_VERSION = "3.11"
